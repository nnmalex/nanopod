substitutions:
  # HA media_player entity ID (without the "media_player." prefix)
  ma_player: "office_assistant"
  # HA base URL and long-lived access token (add ha_token to secrets.yaml)
  ha_url: "http://homeassistant.local:8123"
  ha_token: !secret ha_token

esphome:
  name: nanopod
  friendly_name: "NanoPod"
  platformio_options:
    board_build.flash_mode: qio
    board_build.psram_type: opi
  on_boot:
    priority: 600
    then:
      - switch.turn_on: lcd_power_switch
      - switch.turn_on: backlight_power_switch
      - delay: 100ms
      - light.turn_on:
          id: backlight
          brightness: 100%
      - logger.log: "Display power enabled"
      - delay: 500ms
      - script.execute: led_idle
      - script.execute: update_display
      - logger.log:
          format: "Watching HA entity: media_player.%s"
          args: ['"${ma_player}"']

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP_HTTP_CLIENT_BUF_SIZE: "1024"
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  ap:
    ssid: "NanoPod-AP"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ============================================
# Time (from Home Assistant)
# ============================================
time:
  - platform: homeassistant
    id: ha_time

# ============================================
# Home Assistant State Sensors
# ============================================
text_sensor:
  # Media player state ("playing", "paused", "idle", "off", etc.)
  - platform: homeassistant
    id: ha_player_state
    entity_id: "media_player.${ma_player}"
    on_value:
      then:
        - lambda: |-
            bool playing = (x == "playing");
            id(is_playing) = playing;
            id(current_screen) = playing ? 1 : 0;
            ESP_LOGI("ha", "Player state: %s -> screen=%d", x.c_str(), id(current_screen));
        # Wake display if playback starts while sleeping
        - script.execute: update_display
        - if:
            condition:
              lambda: 'return id(is_playing);'
            then:
              - script.execute: led_playing
            else:
              - script.execute: led_idle

  # Track title
  - platform: homeassistant
    id: ha_media_title
    entity_id: "media_player.${ma_player}"
    attribute: media_title
    on_value:
      then:
        - lambda: 'id(media_title) = x;'
        - if:
            condition:
              lambda: 'return id(current_screen) == 1;'
            then:
              - script.execute: update_player_display

  # Artist name
  - platform: homeassistant
    id: ha_media_artist
    entity_id: "media_player.${ma_player}"
    attribute: media_artist
    on_value:
      then:
        - lambda: 'id(media_artist) = x;'
        - if:
            condition:
              lambda: 'return id(current_screen) == 1;'
            then:
              - script.execute: update_player_display

  # Cover art URL (entity_picture may be a relative HA path)
  - platform: homeassistant
    id: ha_entity_picture
    entity_id: "media_player.${ma_player}"
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            if (x.empty() || x == "unavailable") return;
            if (x[0] == '/') {
              id(current_cover_url) = "${ha_url}" + x;
            } else {
              id(current_cover_url) = x;
            }
            ESP_LOGI("ha", "Cover URL: %s", id(current_cover_url).c_str());
        - script.execute: update_cover_art

sensor:
  # Volume level from HA (0.0–1.0)
  - platform: homeassistant
    id: ha_volume
    entity_id: "media_player.${ma_player}"
    attribute: volume_level
    on_value:
      then:
        - lambda: |-
            if (!std::isnan(x)) {
              id(current_volume) = (int)(x * 100.0f);
            }
        - if:
            condition:
              lambda: 'return id(current_screen) == 1;'
            then:
              - lvgl.arc.update:
                  id: volume_arc
                  value: !lambda 'return id(current_volume);'

  # Rotary encoder - always controls volume
  - platform: rotary_encoder
    id: dial
    name: "Dial Position"
    pin_a: GPIO45
    pin_b: GPIO42
    resolution: 1
    on_clockwise:
      - lambda: 'id(current_volume) = std::min(id(current_volume) + 5, 100);'
      - script.execute: ma_set_volume
      - script.execute: led_show_volume
    on_anticlockwise:
      - lambda: 'id(current_volume) = std::max(id(current_volume) - 5, 0);'
      - script.execute: ma_set_volume
      - script.execute: led_show_volume

http_request:
  useragent: esphome/nanopod
  timeout: 10s
  verify_ssl: false

# Cover art image
online_image:
  - id: cover_art
    url: "https://via.placeholder.com/100.jpg"
    format: JPEG
    resize: 100x100
    type: RGB565
    on_download_finished:
      then:
        - logger.log: "Cover art downloaded"
        - lvgl.image.update:
            id: player_cover
            src: cover_art
    on_error:
      then:
        - logger.log:
            format: "Cover art download failed"
            level: WARN

# ============================================
# Hardware Configuration
# ============================================

spi:
  clk_pin: GPIO10
  mosi_pin: GPIO11

i2c:
  - id: bus_touch
    sda: GPIO6
    scl: GPIO7
    scan: false

touchscreen:
  - platform: cst816
    id: touch
    i2c_id: bus_touch
    interrupt_pin: GPIO5
    reset_pin: GPIO13
    on_touch:
      - lambda: |-
          id(touch_active) = true;
          id(touch_start_x) = touch.x;
          id(touch_start_y) = touch.y;
          id(touch_end_x) = touch.x;
          id(touch_end_y) = touch.y;
          id(touch_start_ms) = millis();
          ESP_LOGD("touch", "Touch start: %d, %d", touch.x, touch.y);
    on_update:
      - lambda: |-
          for (auto &tp : touches) {
            id(touch_end_x) = tp.x;
            id(touch_end_y) = tp.y;
          }
    on_release:
      - script.execute: handle_touch_gesture
      - lambda: |-
          id(touch_active) = false;
          id(last_nav_ms) = millis();

# Power rails - CRITICAL for CrowPanel!
output:
  - platform: gpio
    id: lcd_power
    pin: GPIO1

  - platform: gpio
    id: backlight_power
    pin: GPIO2

  - platform: ledc
    id: backlight_pwm
    pin: GPIO46
    frequency: 1000Hz

switch:
  - platform: output
    id: lcd_power_switch
    name: "LCD Power"
    output: lcd_power
    restore_mode: ALWAYS_ON
    internal: true

  - platform: output
    id: backlight_power_switch
    name: "Backlight Power"
    output: backlight_power
    restore_mode: ALWAYS_ON
    internal: true

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    default_transition_length: 0s
    restore_mode: ALWAYS_ON

  - platform: esp32_rmt_led_strip
    id: rgb_leds
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO48
    num_leds: 5
    name: "Status LEDs"

# ============================================
# Global State
# ============================================
globals:
  - id: current_screen
    type: int
    initial_value: "0"  # 0=CLOCK, 1=PLAYING
  - id: is_playing
    type: bool
    initial_value: "false"
  - id: current_volume
    type: int
    initial_value: "50"
  - id: last_nav_ms
    type: uint32_t
    initial_value: "0"
  - id: touch_active
    type: bool
    initial_value: "false"
  - id: touch_start_x
    type: int
    initial_value: "0"
  - id: touch_start_y
    type: int
    initial_value: "0"
  - id: touch_end_x
    type: int
    initial_value: "0"
  - id: touch_end_y
    type: int
    initial_value: "0"
  - id: touch_start_ms
    type: uint32_t
    initial_value: "0"
  - id: current_cover_url
    type: std::string
  - id: media_title
    type: std::string
  - id: media_artist
    type: std::string

# ============================================
# Intervals
# ============================================
interval:
  # Clock update every second
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - script.execute: update_clock_display

# ============================================
# Button (encoder push)
# ============================================
binary_sensor:
  - platform: gpio
    id: dial_button
    name: "Dial Button"
    pin:
      number: GPIO41
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_multi_click:
      # Short click: play/pause toggle
      - timing:
          - ON for at most 500ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return !id(touch_active) && (millis() - id(last_nav_ms) >= 500);'
              then:
                - if:
                    condition:
                      lambda: 'return id(is_playing);'
                    then:
                      - script.execute: ma_pause
                      - script.execute: led_paused
                    else:
                      - script.execute: ma_resume
                      - script.execute: led_playing
      # Long press: stop
      - timing:
          - ON for at least 800ms
        then:
          - script.execute: ma_stop
          - script.execute: led_idle

# ============================================
# Scripts
# ============================================
script:
  # Route to correct screen and set brightness
  - id: update_display
    then:
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - lvgl.page.show: page_clock
            - light.turn_on:
                id: backlight
                brightness: 50%
                transition_length: 1s
            - script.execute: update_clock_display
      - if:
          condition:
            lambda: 'return id(current_screen) == 1;'
          then:
            - lvgl.page.show: page_player
            - light.turn_on:
                id: backlight
                brightness: 100%
                transition_length: 500ms
            - script.execute: update_player_display

  # Update clock labels with current time
  - id: update_clock_display
    then:
      - lvgl.label.update:
          id: clock_time
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: clock_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            char buf[16];
            // day_of_week: 1=Sun, 2=Mon, ..., 7=Sat
            const char* days[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            const char* months[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            snprintf(buf, sizeof(buf), "%s %d %s", days[t.day_of_week - 1], t.day_of_month, months[t.month - 1]);
            return std::string(buf);

  # Update now-playing labels
  - id: update_player_display
    then:
      - lvgl.label.update:
          id: track_title
          text: !lambda |-
            return id(media_title).empty() ? std::string("Unknown") : id(media_title);
      - lvgl.label.update:
          id: track_artist
          text: !lambda |-
            return id(media_artist);
      - lvgl.label.update:
          id: play_icon
          text: !lambda |-
            return std::string(id(is_playing) ? "| |" : ">");
      - lvgl.arc.update:
          id: volume_arc
          value: !lambda 'return id(current_volume);'
      - lvgl.bar.update:
          id: volume_bar
          value: !lambda 'return id(current_volume);'

  # Fetch and display cover art
  - id: update_cover_art
    then:
      - if:
          condition:
            lambda: 'return !id(current_cover_url).empty();'
          then:
            - online_image.set_url:
                id: cover_art
                url: !lambda 'return id(current_cover_url);'
            - component.update: cover_art

  # Handle touch gestures
  - id: handle_touch_gesture
    then:
      - lambda: |-
          int dx = id(touch_end_x) - id(touch_start_x);
          int dy = id(touch_end_y) - id(touch_start_y);
          uint32_t duration = millis() - id(touch_start_ms);

          const int SWIPE_THRESHOLD = 30;
          const int TAP_MAX_MOVE = 20;
          const uint32_t TAP_MAX_TIME = 300;

          bool is_tap = (abs(dx) < TAP_MAX_MOVE && abs(dy) < TAP_MAX_MOVE && duration < TAP_MAX_TIME);
          bool is_horizontal = abs(dx) > abs(dy);
          bool is_swipe = (is_horizontal ? abs(dx) : abs(dy)) > SWIPE_THRESHOLD;

          ESP_LOGI("touch", "dx=%d dy=%d dur=%dms tap=%d swipe=%d", dx, dy, duration, is_tap, is_swipe);

          if (millis() - id(last_nav_ms) < 400) {
            ESP_LOGD("touch", "Ignoring - debounce");
            return;
          }

          if (is_tap) {
            if (id(is_playing)) {
              id(ma_pause).execute();
              id(led_paused).execute();
            } else {
              id(ma_resume).execute();
              id(led_playing).execute();
            }
            id(last_nav_ms) = millis();
          } else if (is_swipe && is_horizontal) {
            if (dx < 0) {
              id(ma_next).execute();
            } else {
              id(ma_previous).execute();
            }
            id(last_nav_ms) = millis();
          }

  # HA service: Pause
  - id: ma_pause
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/media_pause"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: '{"entity_id":"media_player.${ma_player}"}'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Pause: %d", response->status_code);'

  # HA service: Resume/Play
  - id: ma_resume
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/media_play"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: '{"entity_id":"media_player.${ma_player}"}'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Resume: %d", response->status_code);'

  # HA service: Stop
  - id: ma_stop
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/media_stop"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: '{"entity_id":"media_player.${ma_player}"}'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Stop: %d", response->status_code);'

  # HA service: Next track
  - id: ma_next
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/media_next_track"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: '{"entity_id":"media_player.${ma_player}"}'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Next: %d", response->status_code);'

  # HA service: Previous track
  - id: ma_previous
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/media_previous_track"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: '{"entity_id":"media_player.${ma_player}"}'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Previous: %d", response->status_code);'

  # HA service: Set volume (HA expects 0.0–1.0)
  - id: ma_set_volume
    then:
      - http_request.post:
          url: "${ha_url}/api/services/media_player/volume_set"
          request_headers:
            Content-Type: "application/json"
            Authorization: "Bearer ${ha_token}"
          body: !lambda |-
            char buf[80];
            snprintf(buf, sizeof(buf), "{\"entity_id\":\"media_player.${ma_player}\",\"volume_level\":%.2f}",
                     id(current_volume) / 100.0f);
            return std::string(buf);
          on_response:
            then:
              - lambda: 'ESP_LOGI("ha", "Volume %d%%: %d", id(current_volume), response->status_code);'

  # LED: Playing - brief green flash
  - id: led_playing
    mode: restart
    then:
      - light.turn_on:
          id: rgb_leds
          brightness: 80%
          red: 0%
          green: 100%
          blue: 0%
          effect: "none"
      - delay: 1s
      - light.turn_off:
          id: rgb_leds
          transition_length: 500ms

  # LED: Paused - brief amber flash
  - id: led_paused
    mode: restart
    then:
      - light.turn_on:
          id: rgb_leds
          brightness: 50%
          red: 100%
          green: 50%
          blue: 0%
          effect: "none"
      - delay: 1s
      - light.turn_off:
          id: rgb_leds
          transition_length: 500ms

  # LED: Idle/boot - brief blue flash
  - id: led_idle
    mode: restart
    then:
      - light.turn_on:
          id: rgb_leds
          brightness: 30%
          red: 0%
          green: 0%
          blue: 100%
          effect: "none"
      - delay: 1s
      - light.turn_off:
          id: rgb_leds
          transition_length: 500ms

  # LED + on-screen: Volume change indicator
  - id: led_show_volume
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(current_screen) == 1;'
          then:
            - lvgl.arc.update:
                id: volume_arc
                value: !lambda 'return id(current_volume);'
            - lvgl.bar.update:
                id: volume_bar
                value: !lambda 'return id(current_volume);'
            - lvgl.widget.show: volume_container
      - light.addressable_set:
          id: rgb_leds
          range_from: 0
          range_to: 4
          red: 0%
          green: 0%
          blue: 0%
      - light.addressable_set:
          id: rgb_leds
          range_from: 0
          range_to: !lambda 'return std::min(id(current_volume) / 20, 4);'
          red: 0%
          green: 100%
          blue: 0%
      - delay: 2s
      - if:
          condition:
            lambda: 'return id(current_screen) == 1;'
          then:
            - lvgl.widget.hide: volume_container
      - light.turn_off:
          id: rgb_leds
          transition_length: 500ms

# ============================================
# Display
# ============================================
display:
  - platform: ili9xxx
    model: GC9A01A
    id: main_display
    cs_pin: GPIO9
    dc_pin: GPIO3
    reset_pin: GPIO14
    dimensions:
      width: 240
      height: 240
    rotation: 0
    invert_colors: true
    data_rate: 40MHz
    auto_clear_enabled: false

# ============================================
# LVGL UI
# ============================================
lvgl:
  displays:
    - main_display
  color_depth: 16
  buffer_size: 25%
  log_level: WARN
  page_wrap: false
  pages:
    # ================================================
    # Clock Screen - shown when idle
    # ################################################
    - id: page_clock
      bg_color: 0x0C191E
      widgets:
        # Subtle outer ring
        - obj:
            align: CENTER
            width: 220
            height: 220
            radius: 110
            bg_opa: 0%
            border_color: 0x1E3040
            border_width: 2
            scrollbar_mode: "OFF"
        # Time (large, centered)
        - label:
            id: clock_time
            align: CENTER
            y: -15
            text: "--:--"
            text_font: nanopod_font_32
            text_color: 0xEEEEEE
            text_align: CENTER
        # Date (smaller, below time)
        - label:
            id: clock_date
            align: CENTER
            y: 28
            text: ""
            text_font: nanopod_font_16
            text_color: 0x4A7A9B
            text_align: CENTER

    # ################################################
    # Now Playing Screen
    # ################################################
    - id: page_player
      bg_color: 0x464B55
      widgets:
        # Volume arc (outer ring, 135°–45° sweep)
        - arc:
            id: volume_arc
            align: CENTER
            width: 240
            height: 240
            arc_width: 15
            start_angle: 135
            end_angle: 45
            value: 50
            min_value: 0
            max_value: 100
            adjustable: false
            bg_opa: 0%
            arc_opa: 0%
            indicator:
              arc_color: 0x36B9F6
              arc_width: 15
              arc_opa: 100%
            knob:
              bg_opa: 0%
        # Outer decorative ring
        - obj:
            align: CENTER
            width: 200
            height: 200
            radius: 100
            bg_color: 0x646464
            border_color: 0x2D323C
            border_width: 2
            shadow_color: 0x050A0F
            shadow_width: 40
            shadow_ofs_y: 15
            scrollbar_mode: "OFF"
            widgets:
              # Inner content circle
              - obj:
                  align: CENTER
                  width: 180
                  height: 180
                  radius: 90
                  bg_color: 0x0C191E
                  border_color: 0x5A646E
                  border_width: 1
                  scrollbar_mode: "OFF"
                  widgets:
                    # Cover art
                    - image:
                        id: player_cover
                        align: TOP_MID
                        y: 10
                        width: 70
                        height: 70
                        src: cover_art
                        bg_color: 0x0C191E
                    # Play/pause icon over cover
                    - obj:
                        align: TOP_MID
                        y: 25
                        width: 40
                        height: 40
                        radius: 20
                        bg_color: 0x000000
                        bg_opa: 50%
                        border_width: 0
                        scrollbar_mode: "OFF"
                        widgets:
                          - label:
                              id: play_icon
                              align: CENTER
                              text: ">"
                              text_font: nanopod_font_24
                              text_color: 0xFFFFFF
                    # Track title (scrolls if long)
                    - label:
                        id: track_title
                        align: CENTER
                        y: 28
                        width: 160
                        height: 30
                        text: ""
                        text_font: nanopod_font_16
                        text_color: 0xFFFFFF
                        long_mode: DOT
                        text_align: CENTER
                    # Artist name
                    - label:
                        id: track_artist
                        align: CENTER
                        y: 60
                        width: 160
                        height: 24
                        text: ""
                        text_font: nanopod_font_14
                        text_color: 0x808080
                        long_mode: DOT
                        text_align: CENTER
                    # Volume overlay (hidden, shown briefly on volume change)
                    - obj:
                        id: volume_container
                        align: CENTER
                        y: 80
                        width: 130
                        height: 24
                        bg_color: 0x0C191E
                        bg_opa: 90%
                        radius: 12
                        border_width: 0
                        scrollbar_mode: "OFF"
                        hidden: true
                        widgets:
                          - label:
                              align: LEFT_MID
                              x: 8
                              text: "Vol"
                              text_font: nanopod_font_14
                              text_color: 0x808080
                          - bar:
                              id: volume_bar
                              align: RIGHT_MID
                              x: -8
                              width: 80
                              height: 8
                              value: 50
                              min_value: 0
                              max_value: 100
                              radius: 4
                              bg_color: 0x1E232D
                              indicator:
                                bg_color: 0x36B9F6
                                radius: 4

font:
  - file: "gfonts://Montserrat"
